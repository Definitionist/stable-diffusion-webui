name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"
template: |
  ## What's Changed

  $CHANGES

  **Full Changelog**: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
categories:
  - title: "🚀 Features"
    labels:
      - "enhancement"
      - "feature"
  - title: "🐛 Bug Fixes"
    labels:
      - "bug"
      - "fix"
  - title: "🔒 Security"
    labels:
      - "security"
  - title: "📝 Documentation"
    labels:
      - "documentation"
  - title: "🧪 Tests"
    labels:
      - "tests"
  - title: "🏗️ Dependencies"
    labels:
      - "dependencies"
  - title: "🔧 Maintenance"
    labels:
      - "configuration"
      - "github-actions"
  - title: "🎨 UI"
    labels:
      - "ui"
  - title: "🧩 Extensions"
    labels:
      - "extensions"
change-template: "- $TITLE @$AUTHOR (#$NUMBER)"
change-title-escapes: '\<*_&'
version-resolver:
  major:
    labels:
      - "major"
  minor:
    labels:
      - "minor"
      - "enhancement"
      - "feature"
  patch:
    labels:
      - "patch"
      - "bug"
      - "fix"
  default: patch
exclude-labels:
  - "skip-changelog"
  - "stale"
autolabeler:
  - label: "documentation"
    files:
      - "**/*.md"
  - label: "python"
    files:
      - "**/*.py"
  - label: "javascript"
    files:
      - "**/*.js"

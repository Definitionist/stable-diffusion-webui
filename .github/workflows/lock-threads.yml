name: "Lock closed threads"

on:
  schedule:
    - cron: "0 1 * * *" # Daily at 1:00 UTC

permissions:
  issues: write
  pull-requests: write

jobs:
  lock:
    runs-on: ubuntu-latest
    steps:
      - uses: dessant/lock-threads@v5
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          issue-inactive-days: 90
          issue-lock-reason: "resolved"
          issue-comment: >
            This issue has been automatically locked since there has not been
            any recent activity after it was closed. Please open a new issue
            for related concerns.
          pr-inactive-days: 90
          pr-lock-reason: "resolved"
          pr-comment: >
            This pull request has been automatically locked since there has not been
            any recent activity after it was closed. Please open a new issue or
            pull request for related concerns.
